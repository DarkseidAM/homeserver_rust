[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}
    {%- endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_preprocessors = [
    # Strip Co-Authored-By lines from commit bodies
    { pattern = "Co-Authored-By:.*\n?", replace = "" },
    # Convert PR references to markdown links
    { pattern = "\\(#([0-9]+)\\)", replace = "([#${1}](https://github.com/DarkseidAM/homeserver_rust/pull/${1}))" },
]
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^docs", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^test", group = "Testing" },
    { message = "^ci", group = "CI/CD" },
    { message = "^build", group = "Build" },
    { message = "^chore\\(deps\\)", skip = true },
    { message = "^chore\\(renovate\\)", skip = true },
    { message = "lock file maintenance", skip = true },
    { message = "^chore", group = "Other" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
link_parsers = [
    { pattern = "#([0-9]+)", href = "https://github.com/DarkseidAM/homeserver_rust/pull/${1}", text = "#${1}" },
    { pattern = "[0-9a-f]{7,40}", href = "https://github.com/DarkseidAM/homeserver_rust/commit/${0}", text = "${0}" },
]
